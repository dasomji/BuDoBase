name: Django PostgreSQL

on:
  pull_request:
  push:
    branches: [main]

jobs:
  django-postgresql:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: budobase_test
          POSTGRES_USER: budobase
          POSTGRES_PASSWORD: budobase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U budobase -d budobase_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://budobase:budobase@127.0.0.1:5432/budobase_test
      DJANGO_ENVIRONMENT: development
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/base.txt
      - run: python -m pip install -r requirements/base.txt
      - run: python manage.py test --verbosity 2
