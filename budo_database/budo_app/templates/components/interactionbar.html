{% load static %}
<div id="interaction-bar">
    <div id="interaction-input">
        {% block forminput %}
        <form method="post" enctype="multipart/form-data">
            {%csrf_token %}
            <div id="notiz-form">
                {{ notiz_form.as_p }}
                <label for="id_notiz_fotos" aria-label="Notiz-Fotos">+</label>
                <input id="id_notiz_fotos" name="notiz_fotos" type="file" accept=".jpg,.jpeg,.png,.webp,.heic,.heif,image/jpeg,image/png,image/webp,image/heic,image/heif" multiple>
            </div>
            <div id="geld-form" class="hidden">{{ geld_form.as_p }}</div>
            <div id="erste-hilfe-form" class="hidden">
                {{ erste_hilfe_form.as_p }}
                <p>
                    <label for="id_erste_hilfe_fotos" aria-label="EH-Fotos">+</label>
                    <input
                        id="id_erste_hilfe_fotos"
                        name="erste_hilfe_fotos"
                        type="file"
                        accept=".jpg,.jpeg,.png,.webp,.heic,.heif,image/jpeg,image/png,image/webp,image/heic,image/heif"
                        multiple
                        disabled
                    >
                    <small>JPEG, PNG, WebP, HEIC oder HEIF; höchstens 5 Fotos mit je 10 MB.</small>
                </p>
                <input type="hidden" name="interaction_kind" value="first_aid" disabled>
            </div>
            <button type="submit"><img src="{% static 'img/send-button.svg' %}" alt="send"></button>
        </form>
        {% endblock %}
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const formDivs = document.querySelectorAll('#interaction-input form > div');
        const cookieName = 'interaction-bar';

        function getInteractionCookie(name) {
            let value = "; " + document.cookie;
            let parts = value.split("; " + name + "=");
            if (parts.length === 2) return parts.pop().split(";").shift();
        }

        // Function to set cookie
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        function activateForm(activeDiv) {
            formDivs.forEach(div => {
                const active = div === activeDiv;
                div.classList.toggle('hidden', !active);
                div.querySelectorAll('input, select, textarea').forEach(control => {
                    control.disabled = !active;
                });
            });
        }

        const visibleDivId = getInteractionCookie(cookieName);
        const savedDiv = Array.from(formDivs).find(div => div.id === visibleDivId);
        const initiallyVisible = savedDiv || Array.from(formDivs).find(div => !div.classList.contains('hidden'));
        activateForm(initiallyVisible || formDivs[0]);

        formDivs.forEach(div => {
            const label = div.querySelector('label');
            if (label) {
                label.addEventListener('click', function () {
                    let currentIndex = Array.from(formDivs).indexOf(div);
                    let nextIndex = (currentIndex + 1) % formDivs.length;
                    activateForm(formDivs[nextIndex]);
                    setCookie(cookieName, formDivs[nextIndex].id,
                        7); // Save visible div id in cookie for 7 days
                });
            }
        });
    });
</script>
