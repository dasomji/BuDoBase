{% load static %}
<!doctype html>
<html lang="de"{% if react_print_page %} data-react-print-page="true"{% endif %}>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="budo-request-path" content="{{ request_path }}" />
    <title>BuDoBase</title>
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}" />
    {% if legacy_uses_google_font %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet" />
    {% endif %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" media="print" />
    <link rel="stylesheet" href="{% static 'frontend/app.css' %}" media="{% if react_print_page %}all{% else %}screen{% endif %}" />
    <link rel="stylesheet" href="{% static 'stylesheet.css' %}" media="print" />
    <style>
      @media print {
        {% if react_print_page %}
        #root { display: block !important; }
        #legacy-print-root { display: none !important; }
        {% else %}
        #root { display: none !important; }
        #legacy-print-root { display: block !important; }
        {% endif %}
      }
    </style>
    <script type="module" src="{% static 'frontend/app.js' %}"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="legacy-print-root" aria-hidden="true">{{ legacy_print_body|safe }}</div>
  </body>
</html>
